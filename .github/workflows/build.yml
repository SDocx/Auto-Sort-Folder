name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller watchdog

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name AutoSortFolder
          --add-data "config.json;."
          gui.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSortFolder-windows
          path: dist/AutoSortFolder.exe
          retention-days: 30
